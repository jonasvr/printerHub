# Mosquitto MQTT broker — local development config
# Two listeners: plain TCP (1883) and WebSockets (9001)

listener 1883
allow_anonymous true

# WebSocket listener lets browser-based clients connect directly
listener 9001
protocol websockets
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type all
