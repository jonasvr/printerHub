spring:
  application:
    name: printerhub

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/printerhub}
    username: ${DB_USER:printerhub}
    password: ${DB_PASSWORD:printerhub_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'validate' = Hibernate checks the schema matches entities but won't change it.
      # Use 'create-drop' during early development if you want auto schema creation.
      ddl-auto: update   # Switch to 'validate' + Flyway migrations in Phase 3
    show-sql: false       # Set to true for SQL debugging; noisy in production
    properties:
      hibernate:
        format_sql: true

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: 8080

# ── PrinterHub ────────────────────────────────────────────────────────────
printerhub:
  pushall-interval-seconds: 60   # How often to request full status from each printer (30–300)
  allowed-origins: http://localhost:4200  # Comma-separated; override with PRINTERHUB_ALLOWED_ORIGINS env var

# ── Bambu adapter ─────────────────────────────────────────────────────────
bambu:
  mqtt-port: 8883
  skip-tls-verify: true   # Bambu uses self-signed TLS certs; disable verification for LAN

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    com.printerhub: DEBUG       # Verbose for our own code DEBUG for mqtt message logging
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
